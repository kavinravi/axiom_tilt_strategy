# IB Gateway + IBC (auto-restart) for headless socket-API trading.
# Image: gnzsnz/ib-gateway-docker — runs IB Gateway and IBC, publishing the TWS
# socket API (4001 live / 4002 paper) on localhost only. This is the correct stack
# for ib_async (NOT IBeam, which is the Client Portal Web API).
#
# NOTE: env var names + the socat port-republish mapping occasionally change between
# image versions — verify against the image's current README before deploying.
services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    restart: unless-stopped
    env_file: ./ib-gateway.env
    ports:
      # host:container — the image republishes 4001->4003 (live) / 4002->4004 (paper)
      # via socat, so map the container's 4003/4004 back to the host's 4001/4002.
      - "127.0.0.1:4001:4003"   # LIVE  api
      - "127.0.0.1:4002:4004"   # PAPER api
    volumes:
      - ./gateway-logs:/home/ibgateway/Jts/logs
